# Wazuh Autopilot - MCP Tool Mapping Configuration
# Maps logical operations to actual MCP tool names on Wazuh-MCP-Server v4.0.6
# Version: 2.0.0

schema_version: "2.0"
description: |
  This file maps Autopilot's logical operations to the actual tool names
  exposed by the Wazuh MCP Server (https://github.com/gensecaihq/Wazuh-MCP-Server).
  Update the 'mcp_tool' values if your MCP server uses different tool names.

# =============================================================================
# READ OPERATIONS — Alert Management
# =============================================================================
read_operations:
  # Get alerts from Wazuh Indexer (wazuh-alerts-* index)
  get_alert:
    logical_name: get_alert
    mcp_tool: get_wazuh_alerts
    description: "Retrieve alerts from Wazuh Indexer with filtering"
    required: true
    parameters:
      - name: limit
        type: integer
        required: false
        default: 100
        description: "Max results (1-1000)"
      - name: rule_id
        type: string
        required: false
        description: "Filter by rule ID"
      - name: level
        type: string
        required: false
        description: "Minimum alert level (e.g. 10, 12+)"
      - name: agent_id
        type: string
        required: false
        description: "Filter by agent ID"
      - name: timestamp_start
        type: string
        required: false
        description: "ISO 8601 start time"
      - name: timestamp_end
        type: string
        required: false
        description: "ISO 8601 end time"
      - name: compact
        type: boolean
        required: false
        default: true
        description: "Reduce token usage (~66%)"
    response_fields:
      - alerts
      - total

  # Search alerts (same MCP tool, different logical purpose)
  search_alerts:
    logical_name: search_alerts
    mcp_tool: get_wazuh_alerts
    description: "Search Wazuh alerts with filters"
    required: true
    parameters:
      - name: limit
        type: integer
        required: false
        default: 100
      - name: rule_id
        type: string
        required: false
      - name: level
        type: string
        required: false
      - name: agent_id
        type: string
        required: false
      - name: timestamp_start
        type: string
        required: false
      - name: timestamp_end
        type: string
        required: false
      - name: compact
        type: boolean
        required: false
        default: true
    response_fields:
      - alerts
      - total

  # Full-text search across Wazuh security events
  search_events:
    logical_name: search_events
    mcp_tool: search_security_events
    description: "Full-text search across Wazuh security events"
    required: true
    parameters:
      - name: query
        type: string
        required: true
        description: "Search query text"
      - name: time_range
        type: string
        required: false
        default: "24h"
        description: "Time range: 1h, 6h, 24h, 7d"
      - name: limit
        type: integer
        required: false
        default: 100
      - name: compact
        type: boolean
        required: false
        default: true
    response_fields:
      - events
      - total

  # Alert summary statistics
  get_alert_summary:
    logical_name: get_alert_summary
    mcp_tool: get_wazuh_alert_summary
    description: "Alert statistics grouped by field"
    required: false
    parameters:
      - name: time_range
        type: string
        required: false
        default: "24h"
        description: "Time range: 1h, 6h, 24h, 7d"
      - name: group_by
        type: string
        required: false
        default: "rule.level"

  # Alert pattern analysis
  analyze_patterns:
    logical_name: analyze_patterns
    mcp_tool: analyze_alert_patterns
    description: "Identify alert trends and anomalies"
    required: false
    parameters:
      - name: time_range
        type: string
        required: false
        default: "24h"
      - name: min_frequency
        type: integer
        required: false
        default: 5
        description: "Minimum alert count to report (1-1000)"

# =============================================================================
# READ OPERATIONS — Agent Management
# =============================================================================

  # Get agent information
  get_agent:
    logical_name: get_agent
    mcp_tool: get_wazuh_agents
    description: "Get Wazuh agent details"
    required: true
    parameters:
      - name: agent_id
        type: string
        required: false
        description: "Filter by specific agent ID"
      - name: status
        type: string
        required: false
        description: "Filter: active, disconnected, never_connected"
      - name: limit
        type: integer
        required: false
        default: 100
    response_fields:
      - id
      - name
      - ip
      - status
      - os
      - version

  # Get only running/active agents
  get_running_agents:
    logical_name: get_running_agents
    mcp_tool: get_wazuh_running_agents
    description: "List only active/running agents"
    required: false
    parameters: []

  # Check single agent health
  check_agent_health:
    logical_name: check_agent_health
    mcp_tool: check_agent_health
    description: "Check health status of a specific agent"
    required: false
    parameters:
      - name: agent_id
        type: string
        required: true

  # Get running processes on an agent
  get_agent_processes:
    logical_name: get_agent_processes
    mcp_tool: get_agent_processes
    description: "Get running processes from agent (syscollector)"
    required: false
    parameters:
      - name: agent_id
        type: string
        required: true
      - name: limit
        type: integer
        required: false
        default: 100

  # Get open network ports on an agent
  get_agent_ports:
    logical_name: get_agent_ports
    mcp_tool: get_agent_ports
    description: "Get open network ports from agent (syscollector)"
    required: false
    parameters:
      - name: agent_id
        type: string
        required: true
      - name: limit
        type: integer
        required: false
        default: 100

  # Get agent configuration
  get_agent_config:
    logical_name: get_agent_config
    mcp_tool: get_agent_configuration
    description: "Get agent configuration settings"
    required: false
    parameters:
      - name: agent_id
        type: string
        required: true

# =============================================================================
# READ OPERATIONS — Rule Management
# =============================================================================

  # Get rule information
  get_rule_info:
    logical_name: get_rule_info
    mcp_tool: get_wazuh_rules_summary
    description: "Get Wazuh rules summary and statistics"
    required: false
    parameters: []
    response_fields:
      - total
      - active
      - effectiveness

# =============================================================================
# READ OPERATIONS — Vulnerability Management (requires Wazuh Indexer)
# =============================================================================

  # Query vulnerabilities
  get_vulnerabilities:
    logical_name: get_vulnerabilities
    mcp_tool: get_wazuh_vulnerabilities
    description: "Query vulnerabilities from Wazuh Indexer"
    required: false
    parameters:
      - name: agent_id
        type: string
        required: false
      - name: severity
        type: string
        required: false
        description: "low, medium, high, critical"
      - name: limit
        type: integer
        required: false
        default: 100
        description: "Max results (1-500)"
      - name: compact
        type: boolean
        required: false
        default: true

  # Critical vulnerabilities only
  get_critical_vulns:
    logical_name: get_critical_vulns
    mcp_tool: get_wazuh_critical_vulnerabilities
    description: "Get critical severity vulnerabilities only"
    required: false
    parameters:
      - name: limit
        type: integer
        required: false
        default: 50
      - name: compact
        type: boolean
        required: false
        default: true

  # Vulnerability summary statistics
  get_vuln_summary:
    logical_name: get_vuln_summary
    mcp_tool: get_wazuh_vulnerability_summary
    description: "Aggregated vulnerability statistics"
    required: false
    parameters:
      - name: time_range
        type: string
        required: false
        default: "7d"
        description: "Time range: 1d, 7d, 30d"

# =============================================================================
# READ OPERATIONS — Security Analysis
# =============================================================================

  # IoC threat analysis
  analyze_threat:
    logical_name: analyze_threat
    mcp_tool: analyze_security_threat
    description: "Analyze threat indicator (IP, hash, domain, URL)"
    required: false
    parameters:
      - name: indicator
        type: string
        required: true
      - name: indicator_type
        type: string
        required: false
        default: "ip"
        description: "ip, hash, domain, url"

  # IoC reputation check
  check_ioc:
    logical_name: check_ioc
    mcp_tool: check_ioc_reputation
    description: "Check Indicator of Compromise reputation"
    required: false
    parameters:
      - name: indicator
        type: string
        required: true
      - name: indicator_type
        type: string
        required: false
        default: "ip"

  # Risk assessment
  risk_assessment:
    logical_name: risk_assessment
    mcp_tool: perform_risk_assessment
    description: "Comprehensive risk assessment (agent or environment)"
    required: false
    parameters:
      - name: agent_id
        type: string
        required: false
        description: "Omit for entire environment"

  # Top security threats
  top_threats:
    logical_name: top_threats
    mcp_tool: get_top_security_threats
    description: "Top threats by alert frequency/severity"
    required: false
    parameters:
      - name: limit
        type: integer
        required: false
        default: 10
        description: "Max results (1-50)"
      - name: time_range
        type: string
        required: false
        default: "24h"

  # Security report generation
  security_report:
    logical_name: security_report
    mcp_tool: generate_security_report
    description: "Generate comprehensive security report"
    required: false
    parameters:
      - name: report_type
        type: string
        required: false
        default: "daily"
        description: "daily, weekly, monthly, incident"
      - name: include_recommendations
        type: boolean
        required: false
        default: true

  # Compliance check
  compliance_check:
    logical_name: compliance_check
    mcp_tool: run_compliance_check
    description: "Run compliance framework check"
    required: false
    parameters:
      - name: framework
        type: string
        required: false
        default: "PCI-DSS"
        description: "PCI-DSS, HIPAA, SOX, GDPR, NIST"
      - name: agent_id
        type: string
        required: false

# =============================================================================
# READ OPERATIONS — System Monitoring
# =============================================================================

  # Wazuh system statistics
  get_statistics:
    logical_name: get_statistics
    mcp_tool: get_wazuh_statistics
    description: "Comprehensive Wazuh statistics and metrics"
    required: false
    parameters: []

  # Cluster health
  cluster_health:
    logical_name: cluster_health
    mcp_tool: get_wazuh_cluster_health
    description: "Wazuh cluster health status"
    required: false
    parameters: []

  # Cluster nodes
  cluster_nodes:
    logical_name: cluster_nodes
    mcp_tool: get_wazuh_cluster_nodes
    description: "List Wazuh cluster nodes"
    required: false
    parameters: []

  # Search manager logs
  search_manager_logs:
    logical_name: search_manager_logs
    mcp_tool: search_wazuh_manager_logs
    description: "Search Wazuh manager logs"
    required: false
    parameters:
      - name: query
        type: string
        required: true
      - name: limit
        type: integer
        required: false
        default: 100

  # Manager error logs
  get_error_logs:
    logical_name: get_error_logs
    mcp_tool: get_wazuh_manager_error_logs
    description: "Recent error logs from Wazuh manager"
    required: false
    parameters:
      - name: limit
        type: integer
        required: false
        default: 100

# =============================================================================
# ACTION OPERATIONS (Disabled — MCP Server does not yet support action tools)
# =============================================================================
action_operations:
  block_ip:
    logical_name: block_ip
    mcp_tool: wazuh_block_ip
    description: "Block an IP address via Wazuh active response"
    required: false
    enabled: false
    risk_level: low
    reversible: true
    parameters:
      - name: ip_address
        type: string
        required: true
      - name: duration
        type: integer
        required: false
        description: "Block duration in seconds (0 = permanent)"
      - name: agent_id
        type: string
        required: false
        description: "Target agent (empty = all agents)"
    verification:
      tool: wazuh_check_blocked_ip
      field: blocked
      expected: true

  isolate_host:
    logical_name: isolate_host
    mcp_tool: wazuh_isolate_host
    description: "Isolate a host from the network"
    required: false
    enabled: false
    risk_level: medium
    reversible: true
    parameters:
      - name: agent_id
        type: string
        required: true
    verification:
      tool: wazuh_check_agent_isolation
      field: isolated
      expected: true
    rollback:
      tool: wazuh_unisolate_host

  kill_process:
    logical_name: kill_process
    mcp_tool: wazuh_kill_process
    description: "Terminate a process on an agent"
    required: false
    enabled: false
    risk_level: medium
    reversible: false
    parameters:
      - name: agent_id
        type: string
        required: true
      - name: process_id
        type: integer
        required: true
    verification:
      tool: wazuh_check_process
      field: running
      expected: false

  disable_user:
    logical_name: disable_user
    mcp_tool: wazuh_disable_user
    description: "Disable a user account"
    required: false
    enabled: false
    risk_level: high
    reversible: true
    parameters:
      - name: agent_id
        type: string
        required: true
      - name: username
        type: string
        required: true
    verification:
      tool: wazuh_check_user_status
      field: disabled
      expected: true
    rollback:
      tool: wazuh_enable_user

  quarantine_file:
    logical_name: quarantine_file
    mcp_tool: wazuh_quarantine_file
    description: "Quarantine a file on an agent"
    required: false
    enabled: false
    risk_level: low
    reversible: true
    parameters:
      - name: agent_id
        type: string
        required: true
      - name: file_path
        type: string
        required: true
    verification:
      tool: wazuh_check_file_quarantine
      field: quarantined
      expected: true
    rollback:
      tool: wazuh_restore_file

  active_response:
    logical_name: active_response
    mcp_tool: wazuh_active_response
    description: "Execute Wazuh active response script"
    required: false
    enabled: false
    risk_level: high
    reversible: false
    parameters:
      - name: agent_id
        type: string
        required: true
      - name: command
        type: string
        required: true
      - name: parameters
        type: object
        required: false

  firewall_drop:
    logical_name: firewall_drop
    mcp_tool: wazuh_firewall_drop
    description: "Add firewall drop rule via active response"
    required: false
    enabled: false
    risk_level: medium
    reversible: true
    parameters:
      - name: agent_id
        type: string
        required: true
      - name: src_ip
        type: string
        required: true
      - name: duration
        type: integer
        required: false
    rollback:
      tool: wazuh_firewall_allow

  host_deny:
    logical_name: host_deny
    mcp_tool: wazuh_host_deny
    description: "Add entry to hosts.deny"
    required: false
    enabled: false
    risk_level: medium
    reversible: true
    parameters:
      - name: agent_id
        type: string
        required: true
      - name: src_ip
        type: string
        required: true
    rollback:
      tool: wazuh_host_allow

  restart_wazuh:
    logical_name: restart_wazuh
    mcp_tool: wazuh_restart
    description: "Restart Wazuh agent or manager service"
    required: false
    enabled: false
    risk_level: critical
    reversible: false
    parameters:
      - name: target
        type: string
        required: true
        description: "agent ID or 'manager'"

# =============================================================================
# UTILITY OPERATIONS
# =============================================================================
utility_operations:
  list_tools:
    logical_name: list_tools
    mcp_tool: mcp_list_tools
    description: "List all available MCP tools"
    required: false
    parameters: []
    response_fields:
      - tools

  health_check:
    logical_name: health_check
    mcp_tool: validate_wazuh_connection
    description: "Validate Wazuh/MCP connectivity"
    required: false
    parameters: []
    response_fields:
      - status
      - version

# =============================================================================
# TOOL DISCOVERY CONFIGURATION
# =============================================================================
discovery:
  method: mcp_list
  fallback_to_static: true
  cache_ttl_minutes: 60

  required_for_level:
    read-only:
      - get_alert
      - search_alerts
      - search_events

    approval:
      - get_alert
      - search_alerts
      - search_events

    limited-auto:
      - get_alert
      - search_alerts
      - search_events
      - block_ip

# =============================================================================
# TOOL CALL CONFIGURATION
# =============================================================================
tool_calls:
  default_timeout_ms: 30000

  retry:
    enabled: true
    max_attempts: 3
    backoff_ms: 1000
    backoff_multiplier: 2

  rate_limit:
    max_per_second: 10
    max_per_minute: 300

  circuit_breaker:
    enabled: true
    failure_threshold: 5
    reset_timeout_ms: 60000

# =============================================================================
# RESPONSE MAPPING
# =============================================================================
response_mapping:
  alert:
    id_field: _id
    timestamp_field: timestamp
    severity_field: rule.level
    rule_id_field: rule.id
    agent_id_field: agent.id
    agent_name_field: agent.name

  event:
    id_field: _id
    timestamp_field: timestamp
    agent_id_field: agent.id

  agent:
    id_field: id
    name_field: name
    ip_field: ip
    status_field: status

# =============================================================================
# ERROR HANDLING
# =============================================================================
error_handling:
  error_mapping:
    401: AUTH_FAILED
    403: PERMISSION_DENIED
    404: NOT_FOUND
    429: RATE_LIMITED
    500: MCP_ERROR
    503: MCP_UNAVAILABLE

  on_error:
    log: true
    retry: true
    notify: false

  critical_errors:
    - AUTH_FAILED
    - PERMISSION_DENIED
    - MCP_UNAVAILABLE
